<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grade 3 ELA Trainer</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f6f8fb;
      color: #222;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    h1, h2, h3 { margin-top: 0; }

    .small-note {
      color: #666;
      font-size: 14px;
    }

    .hidden { display: none; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .passage-title {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .passage-meta {
      margin-bottom: 14px;
    }

    .tag {
      display: inline-block;
      background: #eef3ff;
      color: #1e40af;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .tag-difficulty {
      background: #fff7ed;
      color: #c2410c;
    }

    .tag-parent {
      background: #f3e8ff;
      color: #7e22ce;
    }

    .passage-text {
      line-height: 1.8;
      white-space: pre-line;
    }

    .question-number {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    .question-text {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .choices {
      display: grid;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s ease;
    }

    .primary-btn {
      background: #2563eb;
      color: white;
    }

    .primary-btn:hover {
      background: #1d4ed8;
    }

    .secondary-btn {
      background: #6b7280;
      color: white;
    }

    .secondary-btn:hover {
      background: #4b5563;
    }

    .choice-btn {
      width: 100%;
      text-align: left;
      background: #f2f4f8;
    }

    .choice-btn:hover {
      background: #e6ebf4;
    }

    .choice-btn.correct {
      background: #dff5e4;
      border: 2px solid #3aa85b;
    }

    .choice-btn.wrong {
      background: #fde3e3;
      border: 2px solid #d94a4a;
    }

    .choice-btn.disabled {
      opacity: 0.9;
      cursor: default;
    }

    .nav-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .feedback {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      line-height: 1.7;
      display: none;
    }

    .feedback.correct {
      background: #e9f9ee;
      color: #1f6a35;
      display: block;
    }

    .feedback.wrong {
      background: #fff1f1;
      color: #9b2226;
      display: block;
    }

    .explanation {
      margin-top: 8px;
      color: #333;
    }

    .passage-list {
      display: grid;
      gap: 14px;
    }

    .passage-item {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      background: #fafcff;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 16px;
      line-height: 1.6;
      resize: vertical;
    }

    .template-box {
      background: #f8fafc;
      border: 1px dashed #94a3b8;
      padding: 14px;
      border-radius: 12px;
      margin: 14px 0;
      line-height: 1.7;
      white-space: pre-line;
    }

    .checklist {
      margin-top: 14px;
      padding-left: 18px;
      line-height: 1.8;
    }

    .result-box {
      text-align: center;
      padding: 30px 20px;
    }

    .score-big {
      font-size: 42px;
      font-weight: bold;
      margin: 12px 0;
    }

    .parent-panel {
      margin-top: 14px;
      background: #faf5ff;
      border: 1px solid #e9d5ff;
      border-radius: 14px;
      padding: 14px;
      color: #3b0764;
    }

    .parent-panel h4 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .parent-row {
      margin-bottom: 10px;
    }

    .parent-label {
      font-weight: bold;
      display: inline-block;
      margin-right: 6px;
    }

    .divider {
      height: 1px;
      background: #ececec;
      margin: 12px 0;
    }

    @media (max-width: 640px) {
      .question-text { font-size: 18px; }
      .passage-title { font-size: 20px; }
      .score-big { font-size: 34px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="top-bar">
        <div>
          <h1>📘 Grade 3 ELA Trainer</h1>
          <div class="small-note">Practice mode + parent-friendly feedback</div>
        </div>
        <div class="nav-row" style="margin-top:0;">
          <button class="primary-btn" onclick="showHome()">Home</button>
          <button class="secondary-btn" onclick="showPassage()">Read</button>
          <button class="primary-btn" onclick="showQuestion()">Practice</button>
        </div>
      </div>
    </div>

    <div id="homeCard" class="card">
      <h2>Choose a Passage</h2>
      <div class="small-note" style="margin-bottom: 16px;">
        Pick one passage, read it, then practice the questions.
      </div>
      <div id="passageList" class="passage-list"></div>
    </div>

    <div id="passageCard" class="card hidden">
      <div id="passageTitle" class="passage-title"></div>
      <div id="passageMeta" class="passage-meta"></div>
      <div id="passageText" class="passage-text"></div>

      <div class="nav-row">
        <button class="primary-btn" onclick="startSelectedPassage()">Start Questions ▶</button>
        <button class="secondary-btn" onclick="showHome()">Back to Home</button>
      </div>
    </div>

    <div id="questionCard" class="card hidden">
      <div id="questionNumber" class="question-number"></div>
      <div id="questionMeta" style="margin-bottom:10px;"></div>
      <div id="questionText" class="question-text"></div>

      <div id="multipleChoiceArea">
        <div id="choicesContainer" class="choices"></div>
      </div>

      <div id="writingArea" class="hidden">
        <div style="margin-bottom: 10px;">
          <span class="tag">Writing</span>
          <span class="tag">Use Evidence</span>
          <span class="tag">Complete Sentences</span>
        </div>

        <div id="templateBox" class="template-box"></div>
        <textarea id="writingAnswer" placeholder="Type your answer here..."></textarea>

        <div class="nav-row">
          <button class="primary-btn" onclick="checkWriting()">Check My Writing</button>
          <button class="secondary-btn" onclick="fillSample()">Use Sample Answer</button>
        </div>
      </div>

      <div id="feedbackBox" class="feedback">
        <div id="feedbackTitle"></div>
        <div id="feedbackExplanation" class="explanation"></div>
        <ul id="writingChecklist" class="checklist"></ul>

        <div id="parentPanel" class="parent-panel hidden">
          <h4>👨‍👩‍👧 Parent Notes</h4>
          <div class="parent-row">
            <span class="parent-label">题型：</span>
            <span id="parentSkill"></span>
          </div>
          <div class="parent-row">
            <span class="parent-label">难度：</span>
            <span id="parentDifficulty"></span>
          </div>
          <div class="divider"></div>
          <div class="parent-row">
            <span class="parent-label">中文讲解：</span>
            <span id="parentCnExplanation"></span>
          </div>
          <div class="divider"></div>
          <div class="parent-row">
            <span class="parent-label">高频错因：</span>
            <span id="parentMistake"></span>
          </div>
        </div>
      </div>

      <div class="nav-row">
        <button id="nextBtn" class="primary-btn hidden" onclick="nextQuestion()">Next ▶</button>
        <button id="resultBtn" class="primary-btn hidden" onclick="showResults()">See Results ▶</button>
        <button class="secondary-btn" onclick="showPassage()">Back to Passage</button>
      </div>
    </div>

    <div id="resultCard" class="card hidden">
      <div class="result-box">
        <h2>🎉 Practice Complete</h2>
        <div class="small-note" id="resultPassageTitle"></div>
        <div class="score-big" id="finalScore"></div>
        <div id="finalMessage" style="margin-bottom: 18px;"></div>
        <div id="writingSummary" style="margin-bottom: 18px;"></div>

        <div class="nav-row" style="justify-content:center;">
          <button class="primary-btn" onclick="restartCurrentPassage()">Do Again</button>
          <button class="secondary-btn" onclick="showPassage()">Read Again</button>
          <button class="secondary-btn" onclick="showHome()">Choose Another Passage</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { passages } from './data.js';

    let selectedPassageIndex = 0;
    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;
    let writingChecks = {};

    const homeCard = document.getElementById('homeCard');
    const passageCard = document.getElementById('passageCard');
    const questionCard = document.getElementById('questionCard');
    const resultCard = document.getElementById('resultCard');

    const passageList = document.getElementById('passageList');
    const passageTitle = document.getElementById('passageTitle');
    const passageMeta = document.getElementById('passageMeta');
    const passageText = document.getElementById('passageText');

    const questionNumber = document.getElementById('questionNumber');
    const questionMeta = document.getElementById('questionMeta');
    const questionText = document.getElementById('questionText');
    const multipleChoiceArea = document.getElementById('multipleChoiceArea');
    const writingArea = document.getElementById('writingArea');
    const choicesContainer = document.getElementById('choicesContainer');
    const templateBox = document.getElementById('templateBox');
    const writingAnswer = document.getElementById('writingAnswer');

    const feedbackBox = document.getElementById('feedbackBox');
    const feedbackTitle = document.getElementById('feedbackTitle');
    const feedbackExplanation = document.getElementById('feedbackExplanation');
    const writingChecklist = document.getElementById('writingChecklist');

    const parentPanel = document.getElementById('parentPanel');
    const parentSkill = document.getElementById('parentSkill');
    const parentDifficulty = document.getElementById('parentDifficulty');
    const parentCnExplanation = document.getElementById('parentCnExplanation');
    const parentMistake = document.getElementById('parentMistake');

    const nextBtn = document.getElementById('nextBtn');
    const resultBtn = document.getElementById('resultBtn');

    const resultPassageTitle = document.getElementById('resultPassageTitle');
    const finalScore = document.getElementById('finalScore');
    const finalMessage = document.getElementById('finalMessage');
    const writingSummary = document.getElementById('writingSummary');

    function hideAll() {
      homeCard.classList.add('hidden');
      passageCard.classList.add('hidden');
      questionCard.classList.add('hidden');
      resultCard.classList.add('hidden');
    }

    function getSelectedPassage() {
      return passages[selectedPassageIndex];
    }

    function getCurrentQuestion() {
      return getSelectedPassage().questions[currentQuestionIndex];
    }

    function renderHome() {
      passageList.innerHTML = '';

      passages.forEach((passage, index) => {
        const totalQuestions = passage.questions.length;
        const item = document.createElement('div');
        item.className = 'passage-item';

        item.innerHTML = `
          <h3>${passage.title}</h3>
          <div class="small-note" style="margin-bottom: 10px;">
            ${passage.type} • ${totalQuestions} questions
          </div>
          <div>
            <span class="tag">${passage.type}</span>
            <span class="tag">${totalQuestions} items</span>
          </div>
          <div class="nav-row">
            <button class="primary-btn" data-index="${index}" data-action="read">Read Passage</button>
            <button class="secondary-btn" data-index="${index}" data-action="start">Start Practice</button>
          </div>
        `;

        passageList.appendChild(item);
      });

      passageList.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const index = Number(e.target.dataset.index);
          const action = e.target.dataset.action;
          selectedPassageIndex = index;
          resetProgress();

          if (action === 'read') {
            showPassage();
          } else {
            startSelectedPassage();
          }
        });
      });
    }

    function resetProgress() {
      currentQuestionIndex = 0;
      score = 0;
      answered = false;
      writingChecks = {};
      writingAnswer.value = '';
    }

    function renderPassage() {
      const passage = getSelectedPassage();
      passageTitle.textContent = passage.title;
      passageMeta.innerHTML = `
        <span class="tag">${passage.type}</span>
        <span class="tag">${passage.questions.length} questions</span>
      `;
      passageText.textContent = passage.passage;
    }

    function renderQuestionMeta(q) {
      let html = '';
      if (q.skillLabelZh) {
        html += `<span class="tag">${q.skillLabelZh}</span>`;
      }
      if (q.difficulty) {
        html += `<span class="tag tag-difficulty">难度：${q.difficulty}</span>`;
      }
      if (q.type === 'writing') {
        html += `<span class="tag tag-parent">写作题</span>`;
      }
      questionMeta.innerHTML = html;
    }

    function renderQuestion() {
      const passage = getSelectedPassage();
      const q = passage.questions[currentQuestionIndex];

      answered = false;
      feedbackBox.className = 'feedback';
      feedbackBox.style.display = 'none';
      feedbackTitle.innerHTML = '';
      feedbackExplanation.innerHTML = '';
      writingChecklist.innerHTML = '';
      nextBtn.classList.add('hidden');
      resultBtn.classList.add('hidden');
      parentPanel.classList.add('hidden');

      questionNumber.textContent = `${passage.title} • Question ${currentQuestionIndex + 1} of ${passage.questions.length}`;
      questionText.textContent = q.question;
      renderQuestionMeta(q);

      if (q.type === 'multiple') {
        multipleChoiceArea.classList.remove('hidden');
        writingArea.classList.add('hidden');
        renderMultipleChoice(q);
      } else {
        multipleChoiceArea.classList.add('hidden');
        writingArea.classList.remove('hidden');
        renderWriting(q);
      }
    }

    function renderMultipleChoice(q) {
      choicesContainer.innerHTML = '';
      q.choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = `${String.fromCharCode(65 + index)}. ${choice}`;
        btn.onclick = () => selectAnswer(index);
        choicesContainer.appendChild(btn);
      });
    }

    function renderWriting(q) {
      templateBox.textContent = Array.isArray(q.template)
        ? q.template.join('\n')
        : 'Write your answer in complete sentences.';
      writingAnswer.value = '';
    }

    function renderParentPanel(q) {
      const hasAnyParentData =
        q.skillLabelZh || q.difficulty || q.cnExplanation || q.commonMistake;

      if (!hasAnyParentData) {
        parentPanel.classList.add('hidden');
        return;
      }

      parentSkill.textContent = q.skillLabelZh || '—';
      parentDifficulty.textContent = q.difficulty || '—';
      parentCnExplanation.textContent = q.cnExplanation || '—';
      parentMistake.textContent = q.commonMistake || '—';
      parentPanel.classList.remove('hidden');
    }

    function selectAnswer(selectedIndex) {
      if (answered) return;
      answered = true;

      const q = getCurrentQuestion();
      const buttons = document.querySelectorAll('.choice-btn');

      buttons.forEach((btn, index) => {
        btn.classList.add('disabled');
        btn.disabled = true;

        if (index === q.answer) {
          btn.classList.add('correct');
        }

        if (index === selectedIndex && index !== q.answer) {
          btn.classList.add('wrong');
        }
      });

      if (selectedIndex === q.answer) {
        score++;
        feedbackBox.className = 'feedback correct';
        feedbackTitle.innerHTML = '✅ Correct!';
      } else {
        feedbackBox.className = 'feedback wrong';
        feedbackTitle.innerHTML = `❌ Not quite. The correct answer is ${String.fromCharCode(65 + q.answer)}. ${q.choices[q.answer]}.`;
      }

      feedbackExplanation.innerHTML = `
        <div><strong>English Explanation:</strong> ${q.explanation || ''}</div>
      `;
      feedbackBox.style.display = 'block';
      renderParentPanel(q);
      showNextOrResult();
    }

    function checkWriting() {
      const q = getCurrentQuestion();
      const text = writingAnswer.value.trim();
      const lower = text.toLowerCase();

      let points = 0;
      const items = [];

      const hasEnoughText = text.length > 20;
      const hasPeriods = text.includes('.');
      const hasDetailWords = /(one detail|another detail|because|animals|paint|shelter|trash|garden|food|sell|donate|wind|sun|coat|power|eagle|homework)/i.test(text);

      if (hasEnoughText) {
        points++;
        items.push('✅ You wrote enough to show your thinking.');
      } else {
        items.push('❌ Write a little more.');
      }

      if (hasPeriods) {
        points++;
        items.push('✅ You used complete sentences or sentence endings.');
      } else {
        items.push('❌ Add periods to make complete sentences.');
      }

      if (hasDetailWords) {
        points++;
        items.push('✅ You included supporting details.');
      } else {
        items.push('❌ Add evidence from the passage.');
      }

      if (q.skill === 'main_idea') {
        if (/(main idea|help|animals|raccoons|adapt|event)/i.test(lower)) {
          points++;
          items.push('✅ You included the main idea.');
        } else {
          items.push('❌ Add the main idea clearly.');
        }
      } else {
        if (/(means|problem|cause|smart|power|wind|sun|pests|proud|confident|alike)/i.test(lower)) {
          points++;
          items.push('✅ You answered the question directly.');
        } else {
          items.push('❌ Answer the question directly first.');
        }
      }

      let level = '';
      if (points >= 4) {
        level = 'Strong writing response';
        feedbackBox.className = 'feedback correct';
        feedbackTitle.innerHTML = '✅ Nice job!';
        feedbackExplanation.innerHTML = `<div><strong>English Feedback:</strong> Your response includes the important parts of a strong answer.</div>`;
      } else if (points >= 2) {
        level = 'Developing response';
        feedbackBox.className = 'feedback wrong';
        feedbackTitle.innerHTML = '🟡 Good start!';
        feedbackExplanation.innerHTML = `<div><strong>English Feedback:</strong> You have some good ideas. Add clearer details to make your answer stronger.</div>`;
      } else {
        level = 'Needs more detail';
        feedbackBox.className = 'feedback wrong';
        feedbackTitle.innerHTML = '❌ Keep going!';
        feedbackExplanation.innerHTML = `<div><strong>English Feedback:</strong> Try using the sentence frame and include stronger evidence from the passage.</div>`;
      }

      writingChecklist.innerHTML = items.map(item => `<li>${item}</li>`).join('');
      feedbackBox.style.display = 'block';
      writingChecks[q.id] = level;
      answered = true;

      renderParentPanel(q);
      showNextOrResult();
    }

    function fillSample() {
      const q = getCurrentQuestion();
      if (q.sample) {
        writingAnswer.value = q.sample;
      }
    }

    function showNextOrResult() {
      const passage = getSelectedPassage();
      if (currentQuestionIndex < passage.questions.length - 1) {
        nextBtn.classList.remove('hidden');
      } else {
        resultBtn.classList.remove('hidden');
      }
    }

    function nextQuestion() {
      currentQuestionIndex++;
      answered = false;
      renderQuestion();
    }

    function showHome() {
      hideAll();
      renderHome();
      homeCard.classList.remove('hidden');
    }

    function showPassage() {
      hideAll();
      renderPassage();
      passageCard.classList.remove('hidden');
    }

    function showQuestion() {
      hideAll();
      renderQuestion();
      questionCard.classList.remove('hidden');
    }

    function startSelectedPassage() {
      currentQuestionIndex = 0;
      score = 0;
      writingChecks = {};
      writingAnswer.value = '';
      showQuestion();
    }

    function showResults() {
      hideAll();
      const passage = getSelectedPassage();
      resultCard.classList.remove('hidden');

      const multipleCount = passage.questions.filter(q => q.type === 'multiple').length;
      resultPassageTitle.textContent = passage.title;
      finalScore.textContent = `${score} / ${multipleCount}`;

      if (multipleCount === 0) {
        finalMessage.textContent = 'This passage focused on writing practice.';
      } else if (score === multipleCount) {
        finalMessage.textContent = 'Amazing work! You got every multiple-choice question correct.';
      } else if (score >= Math.max(1, multipleCount - 1)) {
        finalMessage.textContent = 'Great job! You are very close to perfect.';
      } else if (score >= Math.ceil(multipleCount / 2)) {
        finalMessage.textContent = 'Nice work. Keep practicing and you will get even stronger.';
      } else {
        finalMessage.textContent = 'Good start. Read carefully and try again.';
      }

      const writingEntries = Object.entries(writingChecks);
      if (writingEntries.length > 0) {
        writingSummary.innerHTML = writingEntries
          .map(([id, result]) => `✍️ ${id}: <strong>${result}</strong>`)
          .join('<br>');
      } else {
        writingSummary.innerHTML = '✍️ No writing question checked yet.';
      }
    }

    function restartCurrentPassage() {
      resetProgress();
      showQuestion();
    }

    window.showHome = showHome;
    window.showPassage = showPassage;
    window.showQuestion = showQuestion;
    window.startSelectedPassage = startSelectedPassage;
    window.nextQuestion = nextQuestion;
    window.checkWriting = checkWriting;
    window.fillSample = fillSample;
    window.showResults = showResults;
    window.restartCurrentPassage = restartCurrentPassage;

    showHome();
  </script>
</body>
</html>
