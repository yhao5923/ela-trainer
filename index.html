<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Practice App</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f7fb;
      color: #222;
    }

    .app {
      max-width: 920px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
    }

    h3 {
      margin-top: 0;
    }

    .subtitle {
      color: #666;
      margin-bottom: 14px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0 8px;
    }

    button {
      border: none;
      background: #1f6feb;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #1859bb;
    }

    button.secondary {
      background: #eef3fb;
      color: #1d3b6d;
    }

    button.secondary:hover {
      background: #dde8fa;
    }

    button.ghost {
      background: #f2f2f2;
      color: #333;
    }

    button.ghost:hover {
      background: #e4e4e4;
    }

    .top-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .passage-title {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .passage-box {
      line-height: 1.8;
      font-size: 18px;
      background: #fbfcff;
      border: 1px solid #dce7f7;
      border-radius: 14px;
      padding: 16px;
    }

    .tap-word {
      color: #1f5fd1;
      font-weight: 600;
      cursor: pointer;
      padding: 1px 2px;
      border-radius: 4px;
    }

    .tap-word:hover {
      background: #eaf1ff;
    }

    .question-block {
      border: 1px solid #e6ebf3;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      background: #fcfdff;
    }

    .question-text {
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .choice {
      display: block;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #dde5f0;
      margin-bottom: 8px;
      cursor: pointer;
      background: #fff;
    }

    .choice input {
      margin-right: 10px;
    }

    .choice.correct {
      background: #eaf8ee;
      border-color: #81c995;
    }

    .choice.wrong {
      background: #fdecec;
      border-color: #e59595;
    }

    .feedback {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      font-weight: 600;
      display: none;
    }

    .feedback.correct {
      display: block;
      background: #eaf8ee;
      color: #176c2f;
    }

    .feedback.wrong {
      display: block;
      background: #fdecec;
      color: #a12626;
    }

    .explanation {
      margin-top: 8px;
      color: #444;
      line-height: 1.6;
      display: none;
    }

    .explanation.show {
      display: block;
    }

    .panel {
      background: #f9fbff;
      border: 1px solid #dce7f7;
      border-radius: 14px;
      padding: 16px;
      margin-top: 12px;
    }

    .hidden {
      display: none;
    }

    .vocab-item,
    .wrong-item {
      border-bottom: 1px solid #e5eaf3;
      padding: 12px 0;
    }

    .vocab-item:last-child,
    .wrong-item:last-child {
      border-bottom: none;
    }

    .vocab-word {
      font-size: 18px;
      font-weight: 700;
    }

    .small {
      color: #666;
      font-size: 14px;
      margin-top: 4px;
    }

    .empty-note {
      color: #666;
      font-style: italic;
    }

    .footer-nav {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 14px;
    }

    .badge {
      display: inline-block;
      background: #eef4ff;
      color: #274c8b;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      margin-right: 8px;
      margin-top: 4px;
    }

    .popup {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 999;
    }

    .popup-card {
      width: min(100%, 440px);
      background: white;
      border-radius: 16px;
      padding: 20px;
      position: relative;
      box-shadow: 0 16px 40px rgba(0,0,0,0.18);
    }

    .close-btn {
      position: absolute;
      top: 8px;
      right: 10px;
      background: transparent;
      color: #444;
      font-size: 24px;
      padding: 4px 8px;
    }

    .close-btn:hover {
      background: #f1f1f1;
    }

    @media (max-width: 640px) {
      .passage-box {
        font-size: 17px;
      }

      h1 {
        font-size: 24px;
      }

      .passage-title {
        font-size: 21px;
      }

      button {
        width: 100%;
      }

      .footer-nav {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>Reading Practice App</h1>
      <div class="subtitle">Passage, Questions, Audio, Word Help, Wrong Book, and Word Book</div>

      <div class="toolbar">
        <button id="readAloudBtn">Read Aloud</button>
        <button id="stopAudioBtn" class="ghost">Stop Audio</button>
        <button id="wordHelpBtn" class="secondary">Word Help</button>
        <button id="wordBookBtn" class="secondary">Word Book</button>
        <button id="wrongBookBtn" class="secondary">Wrong Book</button>
      </div>
    </div>

    <div class="card">
      <div class="top-row">
        <div>
          <div id="passageNumber" class="small"></div>
          <div id="passageTitle" class="passage-title"></div>
        </div>
      </div>

      <div id="passage" class="passage-box"></div>

      <div id="wordHelpPanel" class="panel hidden"></div>
      <div id="wordBookPanel" class="panel hidden"></div>
      <div id="wrongBookPanel" class="panel hidden"></div>
    </div>

    <div class="card">
      <h2>Questions</h2>
      <div id="questionsContainer"></div>

      <div class="footer-nav">
        <button id="prevBtn" class="ghost">Previous Passage</button>
        <button id="nextBtn">Next Passage</button>
      </div>
    </div>
  </div>

  <div id="wordPopup" class="popup hidden">
    <div class="popup-card">
      <button id="closePopupBtn" class="close-btn">×</button>
      <h3 id="popupWord"></h3>
      <div id="popupPronunciation" class="small"></div>
      <p id="popupMeaning"></p>
      <p id="popupExample"></p>
    </div>
  </div>

  <script>
    const passages = [
      {
        id: 1,
        title: "Big Moon Tortilla",
        passage: `Big Moon wanted to make a tortilla. She mixed the corn and patted the dough. Then she cooked it over the fire. The tortilla was warm and ready to eat.`,
        vocabulary: [
          {
            word: "tortilla",
            pronunciation: "/tɔːrˈtiː.jə/",
            meaning: "A thin, round flatbread made from corn or flour.",
            example: "Big Moon made a warm tortilla."
          },
          {
            word: "mixed",
            pronunciation: "/mɪkst/",
            meaning: "Combined two or more things together.",
            example: "She mixed the corn with water."
          },
          {
            word: "dough",
            pronunciation: "/doʊ/",
            meaning: "A soft mixture used to make bread or other baked food.",
            example: "The dough was ready to cook."
          },
          {
            word: "cooked",
            pronunciation: "/kʊkt/",
            meaning: "Prepared food by heating it.",
            example: "She cooked the tortilla over the fire."
          },
          {
            word: "fire",
            pronunciation: "/faɪər/",
            meaning: "Something hot and bright that burns.",
            example: "The food was cooked over the fire."
          }
        ],
        questions: [
          {
            q: "What did Big Moon want to make?",
            choices: ["A soup", "A tortilla", "A cake", "A pie"],
            answer: 1,
            explanation: "The passage says that Big Moon wanted to make a tortilla.",
            relatedWords: ["tortilla"]
          },
          {
            q: "What did she do before cooking?",
            choices: ["She mixed the corn", "She cut apples", "She planted seeds", "She washed dishes"],
            answer: 0,
            explanation: "The passage says she mixed the corn and patted the dough before cooking.",
            relatedWords: ["mixed", "dough"]
          }
        ]
      },
      {
        id: 2,
        title: "The North Wind and the Sun",
        passage: `The North Wind and the Sun argued about who was stronger. They saw a traveler wearing a coat. The North Wind blew hard, but the traveler held his coat tighter. Then the Sun shone warmly, and the traveler took off his coat.`,
        vocabulary: [
          {
            word: "argued",
            pronunciation: "/ˈɑːrɡjuːd/",
            meaning: "Spoke in a strong way because of disagreement.",
            example: "The two friends argued about the game."
          },
          {
            word: "traveler",
            pronunciation: "/ˈtrævələr/",
            meaning: "A person who is going from one place to another.",
            example: "The traveler walked down the road."
          },
          {
            word: "blew",
            pronunciation: "/bluː/",
            meaning: "Moved air strongly.",
            example: "The wind blew all day."
          },
          {
            word: "tighter",
            pronunciation: "/ˈtaɪtər/",
            meaning: "More closely or more firmly.",
            example: "She held the bag tighter."
          },
          {
            word: "warmly",
            pronunciation: "/ˈwɔːrmli/",
            meaning: "In a warm and gentle way.",
            example: "The sun shone warmly in the sky."
          }
        ],
        questions: [
          {
            q: "Why did the traveler take off his coat?",
            choices: ["Because it was raining", "Because the Sun shone warmly", "Because the wind got colder", "Because he was running"],
            answer: 1,
            explanation: "The traveler took off his coat after the Sun shone warmly.",
            relatedWords: ["warmly", "traveler"]
          },
          {
            q: "What happened when the North Wind blew hard?",
            choices: ["The traveler dropped the coat", "The traveler held his coat tighter", "The traveler sat down", "The coat flew away"],
            answer: 1,
            explanation: "The passage says the traveler held his coat tighter when the North Wind blew hard.",
            relatedWords: ["blew", "tighter"]
          }
        ]
      }
    ];

    let currentPassageIndex = 0;
    let wordBook = JSON.parse(localStorage.getItem("wordBook") || "[]");
    let wrongBook = JSON.parse(localStorage.getItem("wrongBook") || "[]");

    const passageNumberEl = document.getElementById("passageNumber");
    const passageTitleEl = document.getElementById("passageTitle");
    const passageEl = document.getElementById("passage");
    const questionsContainer = document.getElementById("questionsContainer");

    const wordHelpBtn = document.getElementById("wordHelpBtn");
    const wordBookBtn = document.getElementById("wordBookBtn");
    const wrongBookBtn = document.getElementById("wrongBookBtn");
    const readAloudBtn = document.getElementById("readAloudBtn");
    const stopAudioBtn = document.getElementById("stopAudioBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    const wordHelpPanel = document.getElementById("wordHelpPanel");
    const wordBookPanel = document.getElementById("wordBookPanel");
    const wrongBookPanel = document.getElementById("wrongBookPanel");

    const wordPopup = document.getElementById("wordPopup");
    const closePopupBtn = document.getElementById("closePopupBtn");
    const popupWord = document.getElementById("popupWord");
    const popupPronunciation = document.getElementById("popupPronunciation");
    const popupMeaning = document.getElementById("popupMeaning");
    const popupExample = document.getElementById("popupExample");

    function getCurrentPassage() {
      return passages[currentPassageIndex];
    }

    function saveWordBook() {
      localStorage.setItem("wordBook", JSON.stringify(wordBook));
    }

    function saveWrongBook() {
      localStorage.setItem("wrongBook", JSON.stringify(wrongBook));
    }

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function addToWordBook(wordObj, sourceTitle = "") {
      const exists = wordBook.some(
        item => item.word.toLowerCase() === wordObj.word.toLowerCase()
      );
      if (!exists) {
        wordBook.push({
          ...wordObj,
          sourceTitle
        });
        saveWordBook();
      }
    }

    function addQuestionWordsToWordBook(question, passage) {
      const related = question.relatedWords || [];
      const vocab = passage.vocabulary || [];
      related.forEach(word => {
        const found = vocab.find(v => v.word.toLowerCase() === word.toLowerCase());
        if (found) {
          addToWordBook(found, passage.title);
        }
      });
    }

    function addToWrongBook(question, selectedIndex, passage) {
      const exists = wrongBook.some(item =>
        item.passageTitle === passage.title && item.question === question.q
      );

      if (!exists) {
        wrongBook.push({
          passageTitle: passage.title,
          question: question.q,
          choices: question.choices,
          correctAnswer: question.choices[question.answer],
          selectedAnswer: selectedIndex >= 0 ? question.choices[selectedIndex] : "No answer",
          explanation: question.explanation
        });
        saveWrongBook();
      }
    }

    function showWordPopup(wordObj, sourceTitle = "") {
      popupWord.textContent = wordObj.word;
      popupPronunciation.textContent = wordObj.pronunciation || "";
      popupMeaning.textContent = wordObj.meaning || "";
      popupExample.textContent = wordObj.example ? "Example: " + wordObj.example : "";
      addToWordBook(wordObj, sourceTitle);
      renderWordBook();
      wordPopup.classList.remove("hidden");
    }

    function closeWordPopup() {
      wordPopup.classList.add("hidden");
    }

    function wrapVocabularyWords(text, vocabulary) {
      if (!vocabulary || !vocabulary.length) return text;

      let output = text;

      vocabulary.forEach((item, index) => {
        const safeWord = escapeRegExp(item.word);
        const regex = new RegExp(`\\b(${safeWord})\\b`, "gi");
        output = output.replace(regex, `<span class="tap-word" data-vocab-index="${index}">$1</span>`);
      });

      return output;
    }

    function bindTapWords(container, vocabulary, sourceTitle) {
      const words = container.querySelectorAll(".tap-word");
      words.forEach(el => {
        el.addEventListener("click", () => {
          const idx = Number(el.dataset.vocabIndex);
          const wordObj = vocabulary[idx];
          if (wordObj) showWordPopup(wordObj, sourceTitle);
        });
      });
    }

    function renderWordHelp() {
      const current = getCurrentPassage();
      const vocab = current.vocabulary || [];

      if (!vocab.length) {
        wordHelpPanel.innerHTML = `
          <h3>Word Help</h3>
          <div class="empty-note">No word help for this passage yet.</div>
        `;
        return;
      }

      wordHelpPanel.innerHTML = `
        <h3>Word Help</h3>
        ${vocab.map(item => `
          <div class="vocab-item">
            <div class="vocab-word">${item.word}</div>
            <div class="small">${item.pronunciation || ""}</div>
            <div>${item.meaning || ""}</div>
            <div class="small">Example: ${item.example || ""}</div>
          </div>
        `).join("")}
      `;
    }

    function renderWordBook() {
      if (!wordBook.length) {
        wordBookPanel.innerHTML = `
          <h3>Word Book</h3>
          <div class="empty-note">No saved words yet.</div>
        `;
        return;
      }

      wordBookPanel.innerHTML = `
        <h3>Word Book</h3>
        ${wordBook.map(item => `
          <div class="vocab-item">
            <div class="vocab-word">${item.word}</div>
            <div class="small">${item.pronunciation || ""}</div>
            <div>${item.meaning || ""}</div>
            <div class="small">Example: ${item.example || ""}</div>
            <div class="small">From: ${item.sourceTitle || "Unknown passage"}</div>
          </div>
        `).join("")}
      `;
    }

    function renderWrongBook() {
      if (!wrongBook.length) {
        wrongBookPanel.innerHTML = `
          <h3>Wrong Book</h3>
          <div class="empty-note">No wrong answers yet.</div>
        `;
        return;
      }

      wrongBookPanel.innerHTML = `
        <h3>Wrong Book</h3>
        ${wrongBook.map(item => `
          <div class="wrong-item">
            <div><strong>Passage:</strong> ${item.passageTitle}</div>
            <div style="margin-top:6px;"><strong>Question:</strong> ${item.question}</div>
            <div class="small">Your answer: ${item.selectedAnswer}</div>
            <div class="small">Correct answer: ${item.correctAnswer}</div>
            <div style="margin-top:6px;">${item.explanation}</div>
          </div>
        `).join("")}
      `;
    }

    function hidePanelsExcept(target) {
      const panels = [wordHelpPanel, wordBookPanel, wrongBookPanel];
      panels.forEach(panel => {
        if (panel === target) {
          panel.classList.toggle("hidden");
        } else {
          panel.classList.add("hidden");
        }
      });
    }

    function renderPassage() {
      const current = getCurrentPassage();
      passageNumberEl.textContent = `Passage ${currentPassageIndex + 1} of ${passages.length}`;
      passageTitleEl.textContent = current.title;

      const htmlText = wrapVocabularyWords(current.passage, current.vocabulary || []);
      passageEl.innerHTML = htmlText.replace(/\n/g, "<br>");
      bindTapWords(passageEl, current.vocabulary || [], current.title);

      renderWordHelp();
      renderQuestions();
    }

    function renderQuestions() {
      const current = getCurrentPassage();

      questionsContainer.innerHTML = current.questions.map((question, qIndex) => {
        return `
          <div class="question-block" data-question-index="${qIndex}">
            <div class="question-text">${qIndex + 1}. ${question.q}</div>

            ${question.choices.map((choice, cIndex) => `
              <label class="choice" data-choice-index="${cIndex}">
                <input type="radio" name="question-${qIndex}" value="${cIndex}">
                ${choice}
              </label>
            `).join("")}

            <button class="check-btn" data-question-index="${qIndex}">Check Answer</button>
            <div class="feedback" id="feedback-${qIndex}"></div>
            <div class="explanation" id="explanation-${qIndex}"></div>
          </div>
        `;
      }).join("");

      document.querySelectorAll(".check-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const qIndex = Number(btn.dataset.questionIndex);
          checkAnswer(qIndex);
        });
      });
    }

    function checkAnswer(qIndex) {
      const current = getCurrentPassage();
      const question = current.questions[qIndex];
      const block = document.querySelector(`.question-block[data-question-index="${qIndex}"]`);
      const selected = block.querySelector(`input[name="question-${qIndex}"]:checked`);
      const feedback = document.getElementById(`feedback-${qIndex}`);
      const explanation = document.getElementById(`explanation-${qIndex}`);
      const choices = block.querySelectorAll(".choice");

      choices.forEach(choice => {
        choice.classList.remove("correct", "wrong");
      });

      if (!selected) {
        feedback.className = "feedback wrong";
        feedback.textContent = "Please choose an answer first.";
        explanation.className = "explanation";
        explanation.textContent = "";
        return;
      }

      const selectedIndex = Number(selected.value);

      if (selectedIndex === question.answer) {
        feedback.className = "feedback correct";
        feedback.textContent = "Correct!";
      } else {
        feedback.className = "feedback wrong";
        feedback.textContent = "Not quite. Try to learn from the explanation below.";
        addToWrongBook(question, selectedIndex, current);
        addQuestionWordsToWordBook(question, current);
        renderWrongBook();
        renderWordBook();
      }

      choices.forEach((choiceEl, idx) => {
        if (idx === question.answer) {
          choiceEl.classList.add("correct");
        }
        if (idx === selectedIndex && selectedIndex !== question.answer) {
          choiceEl.classList.add("wrong");
        }
      });

      explanation.className = "explanation show";
      explanation.textContent = question.explanation;
    }

    function speakCurrentPassage() {
      speechSynthesis.cancel();
      const current = getCurrentPassage();
      const utter = new SpeechSynthesisUtterance(current.title + ". " + current.passage);
      utter.lang = "en-US";
      utter.rate = 0.95;
      speechSynthesis.speak(utter);
    }

    function stopSpeaking() {
      speechSynthesis.cancel();
    }

    readAloudBtn.addEventListener("click", speakCurrentPassage);
    stopAudioBtn.addEventListener("click", stopSpeaking);

    wordHelpBtn.addEventListener("click", () => {
      renderWordHelp();
      hidePanelsExcept(wordHelpPanel);
    });

    wordBookBtn.addEventListener("click", () => {
      renderWordBook();
      hidePanelsExcept(wordBookPanel);
    });

    wrongBookBtn.addEventListener("click", () => {
      renderWrongBook();
      hidePanelsExcept(wrongBookPanel);
    });

    prevBtn.addEventListener("click", () => {
      stopSpeaking();
      currentPassageIndex = (currentPassageIndex - 1 + passages.length) % passages.length;
      renderPassage();
      wordHelpPanel.classList.add("hidden");
      wordBookPanel.classList.add("hidden");
      wrongBookPanel.classList.add("hidden");
    });

    nextBtn.addEventListener("click", () => {
      stopSpeaking();
      currentPassageIndex = (currentPassageIndex + 1) % passages.length;
      renderPassage();
      wordHelpPanel.classList.add("hidden");
      wordBookPanel.classList.add("hidden");
      wrongBookPanel.classList.add("hidden");
    });

    closePopupBtn.addEventListener("click", closeWordPopup);
    wordPopup.addEventListener("click", (e) => {
      if (e.target === wordPopup) closeWordPopup();
    });

    renderPassage();
    renderWordBook();
    renderWrongBook();
  </script>
</body>
</html>
